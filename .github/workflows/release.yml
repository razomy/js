name: Release

on:
  push:
    tags:
      - 'v*' # Запуск только при создании тегов вида v1.0.0, v2.1.3-beta и т.д.

jobs:
  build-test-release:
    name: Test and Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Важно для скриптов релиза (чтобы видели историю коммитов)

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '25' # Укажи свою версию Node.js
          cache: 'npm'       # Ускоряет установку зависимостей
          registry-url: 'https://registry.npmjs.org' # Нужно для публикации в npm

      - name: Install Dependencies
        run: npm ci # В монорепозитории установит зависимости для всех воркспейсов

      - name: Run Tests
        # Запускает тесты во всех воркспейсах (убедись, что в корневом package.json есть скрипт "test")
        run: npm test

      - name: Run Release Script
        # Запускает твой кастомный скрипт
        run: npm run release
        env:
          # Токен для публикации в NPM (добавь в настройки GitHub)
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          # Стандартный токен GitHub (создается автоматически, нужен если твой скрипт делает GitHub Releases)
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}